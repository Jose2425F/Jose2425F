name: Generar animación de la serpiente

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generar SVG de la serpiente
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%238b5cf6&color_dots=%23ebedf0,%237dd3fc,%2338bdf8,%23a78bfa,%23f472b6
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23a78bfa&color_dots=%23161b22,%2322d3ee,%2338bdf8,%23a78bfa,%23f472b6

      - name: Normalizar colores (añadir # faltante a las variables CSS)
        run: |
          for f in dist/*.svg; do
            sudo sed -E -i 's/(--c[a-z0-9]+:)([0-9a-fA-F]{6})([;}])/\1#\2\3/g' "$f"
          done
          echo "Variables de color tras normalizar:"
          grep -oE '\-\-c[a-z0-9]+:#?[0-9a-fA-F]{6,8}' dist/github-snake.svg | head || true

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
