name: Generar animación de la serpiente

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generar SVG de la serpiente
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=8b5cf6&color_dots=ebedf0,7dd3fc,38bdf8,a78bfa,f472b6
            dist/github-snake-dark.svg?palette=github-dark&color_snake=a78bfa&color_dots=161b22,22d3ee,38bdf8,a78bfa,f472b6

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
